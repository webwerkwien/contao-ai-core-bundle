services:
    _defaults:
        autowire: true
        autoconfigure: true

    Webwerkwien\ContaoCliBridgeBundle\:
        resource: ../src
        exclude: ../src/{ContaoManager,ContaoCliBridgeBundle.php}

    Webwerkwien\ContaoCliBridgeBundle\Command\FolderCreateCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    Webwerkwien\ContaoCliBridgeBundle\Command\FileProcessCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    Webwerkwien\ContaoCliBridgeBundle\Command\FileReadCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    Webwerkwien\ContaoCliBridgeBundle\Command\FileWriteCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    Webwerkwien\ContaoCliBridgeBundle\Command\TemplateListCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    Webwerkwien\ContaoCliBridgeBundle\Command\TemplateReadCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    Webwerkwien\ContaoCliBridgeBundle\Command\TemplateWriteCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'
