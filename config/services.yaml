services:
    _defaults:
        autowire: true
        autoconfigure: true

    # Auto-Tag aller EntityCloner aus diesem File (PageCloner, da page/article/content
    # zum contao/core-bundle gehören und immer geladen sind). Plugin-bedingte Cloner
    # in services_<plugin>.yaml haben jeweils eigenes _instanceof (per-File-Scope).
    _instanceof:
        Webwerkwien\ContaoAiCoreBundle\Service\Cloner\EntityClonerInterface:
            tags: ['contao_ai.entity_cloner']

    Webwerkwien\ContaoAiCoreBundle\:
        resource: ../src
        # Plugin-bedingte Commands sind aus dem Auto-Discover ausgeschlossen
        # und werden in services_{news,calendar,faq,comments}.yaml geladen,
        # nur wenn das jeweilige Contao-Bundle (news, calendar, faq, comments)
        # tatsächlich installiert ist (siehe ContaoAiCoreBundle::loadExtension).
        exclude:
            - ../src/{ContaoManager,ContaoAiCoreBundle.php}
            - ../src/Command/News*.php
            - ../src/Command/Event*.php
            - ../src/Command/Faq*.php
            - ../src/Command/Comment*.php
            # Cloner sind plugin-bedingt und werden in services_<plugin>.yaml registriert.
            - ../src/Service/Cloner/EntityClonerInterface.php
            - ../src/Service/Cloner/News*.php
            - ../src/Service/Cloner/Calendar*.php
            - ../src/Service/Cloner/FaqCategory*.php

    Webwerkwien\ContaoAiCoreBundle\Command\FolderCreateCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    Webwerkwien\ContaoAiCoreBundle\Command\FileProcessCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    Webwerkwien\ContaoAiCoreBundle\Command\FileReadCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    Webwerkwien\ContaoAiCoreBundle\Command\FileWriteCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    Webwerkwien\ContaoAiCoreBundle\Command\TemplateListCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    Webwerkwien\ContaoAiCoreBundle\Command\TemplateReadCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    Webwerkwien\ContaoAiCoreBundle\Command\TemplateWriteCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'
